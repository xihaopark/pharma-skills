# Core 3 adversarial review sub-agent.
# Invoked by er-exposure-metrics SKILL.md -> "Adversarial review (MANDATORY)".
# AFTER exposure metric artifacts are written and BEFORE handoff to Core 4.
interface:
  display_name: "ER Core 3 Adversarial Review"
  short_description: "Challenge exposure metric provenance, windows, transforms, and readiness before Core 4."
  default_prompt: >
    Act as an adversarial senior pharmacometrician reviewing Core 3 exposure
    metric outputs BEFORE they are handed to Core 4. Do not rerun the analysis,
    recalculate metrics, or edit the spec. Read every file under `review.reads`,
    then work through each challenge. Write one advisory row per challenge to
    `review.output.artifact` with severity `block`, `needs_review`, or `ok`.
review:
  reads:
    - config/er_workflow_spec.yaml
    - intermediate/01_understanding_data/analysis_readiness_flags.csv
    - intermediate/03_exposure_metrics/exposure_metric_definitions.csv
    - intermediate/03_exposure_metrics/exposure_metric_records.csv
    - intermediate/03_exposure_metrics/subject_exposure_metrics.csv
    - intermediate/03_exposure_metrics/needs_review_mapping.csv
    - outputs/manifest.json
  challenges:
    - id: metric_definition_status
      prompt: >
        Does every metric carry an explicit window, transform, source column,
        analyte, and status/review gate? Flag unconfirmed values that were used
        as if confirmed.
    - id: provenance_and_source_type
      prompt: >
        Is observed_or_modeled provenance correct on every row? Flag any posthoc
        or modeled metric treated as observed, or any observed ADPC metric routed
        through posthoc assumptions.
    - id: cycle_and_window_logic
      prompt: >
        Are cycle keys and windows defensible for the source type? In particular,
        flag cumulative posthoc AUC values that were integrated as if they were
        concentration-time observations.
    - id: missing_or_sparse_metrics
      prompt: >
        Are missing metrics, absent source columns, insufficient in-window
        samples, and NONMEM placeholders surfaced in needs_review_mapping.csv
        rather than silently dropped?
    - id: scenario_consistency
      prompt: >
        Do modality, indication_or_disease, and scenario_key agree across Core 3
        artifacts and upstream reusable intermediates?
  output:
    artifact: intermediate/03_exposure_metrics/core3_review_findings.csv
    schema: [challenge, finding, severity, cited_artifact, cited_row, review_gate, recommended_action]
    note: >
      Advisory record. Does not auto-edit metric definitions or intermediates.
      Resolve every `block` row before invoking Core 4.

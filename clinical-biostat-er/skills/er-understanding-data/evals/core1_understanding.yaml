# Offline eval set for Core 1 (er-understanding-data) — pinned to a FROZEN snapshot.
#
# Why a frozen snapshot: the live test_datasets_01 Core 1 artifacts drift and were
# internally inconsistent at pin time (spec modality "to be confirmed" vs analyte
# inventory "ADC/oncology", readiness claiming no ADTTE while adtte is inventoried, no
# data_quality_findings.csv on disk). These eval answers are pinned to a coherent
# snapshot regenerated via _generate_snapshot.R (the documented Core 1 API run on the
# real fixture source data, ADC + oncology context), NOT to the live tree. Each snapshot
# file carries a sha256 so the answers cannot silently drift; re-pin deliberately by
# re-running _generate_snapshot.R and updating the hashes here.
#
# Run:  Rscript skills/er-understanding-data/evals/run_core1_evals.R
#       (add --check-freshness to compare the live fixture against the snapshot)

eval_id: core1_understanding_data
fixture: test_datasets_01            # ADC + oncology
pinned_at: 2026-06-16                # re-pinned after Core 1 PK DQ scope change
snapshot_dir: snapshots/test_datasets_01_core1

# Each artifact is frozen + hashed so answers can't silently drift.
snapshots:
  dataset_inventory:
    path: dataset_inventory.csv
    sha256: "61710535b43158a0c8b26bad56bfaa1b82cf27778a6a6ca6dccf26374544a4b8"
  selected_sources:
    path: selected_source_datasets.csv
    sha256: "61710535b43158a0c8b26bad56bfaa1b82cf27778a6a6ca6dccf26374544a4b8"
  readiness:
    path: analysis_readiness_flags.csv
    sha256: "5aefc35fbdbe0ecbd87958b75c0447a6d53f1ee1d9589bb4c6797698ce80ca19"
  analyte_inventory:
    path: analyte_inventory.csv
    sha256: "9d8f8e28a53e22d9b7e0fa5fc47794027f8bb91d0c4873548c07da154aa113a8"
  data_quality:
    path: data_quality_findings.csv
    sha256: "45fabe3fd0137dd95c9ddda6966506cdae93affc42cbbc97b9da821091c3ac1e"
  dose_normalization:
    path: dose_normalization_gate.csv
    sha256: "9f5be2bb07e9e286fa5f547bde8ee2302f6502774ea4e90e23ac07e540f8af78"

cases:
  # ---- Role mapping --------------------------------------------------------
  - id: role_map_adsl_is_population
    question: "What role is dataset 'adsl' assigned?"
    source: dataset_inventory
    check: { column: role, where: { dataset: adsl }, equals: "subject-level population" }
  - id: role_map_adpc_is_pk_ck
    question: "What role is dataset 'adpc' assigned?"
    source: dataset_inventory
    check: { column: role, where: { dataset: adpc }, equals: "PK/CK concentration-time" }
  - id: role_map_adex_is_dosing
    question: "What role is dataset 'adex' assigned?"
    source: dataset_inventory
    check: { column: role, where: { dataset: adex }, equals: "dosing/exposure" }
  - id: role_map_adtte_is_tte
    question: "What role is dataset 'adtte' assigned? (Guards the 'No ADTTE found' drift.)"
    source: dataset_inventory
    check: { column: role, where: { dataset: adtte }, equals: "time-to-event" }
  - id: role_map_no_unknowns
    question: "Are any datasets left classified 'unknown'?"
    source: dataset_inventory
    check: { count_where: { role: unknown }, equals: 0 }

  # ---- Analyte scope -------------------------------------------------------
  - id: analyte_scope_in_scope_count
    question: "How many ADPC PARAMREP x PARAMCD tuples are in-scope?"
    source: analyte_inventory
    check: { count_where: { in_scope: "TRUE" }, equals: 12 }
  - id: analyte_scope_compoundx_in_scope
    question: "Is CompoundX intact L01EI3U2 in scope?"
    source: analyte_inventory
    check: { column: in_scope, where: { paramcd: L01EI3U2 }, equals: "TRUE" }
  - id: analyte_scope_metabolics_out
    question: "Is the metabolics analyte L01AC2U1 out of scope?"
    source: analyte_inventory
    check: { column: in_scope, where: { paramcd: L01AC2U1 }, equals: "FALSE" }

  # ---- Readiness status ----------------------------------------------------
  - id: readiness_pk_ck_candidate
    question: "What is the readiness status for the pk_ck domain?"
    source: readiness
    check: { column: status, where: { domain: pk_ck }, equals: candidate }
  - id: readiness_dq_gate
    question: "Given a Critical pk_absent_under_treatment finding, what readiness does data_quality_review take?"
    source: readiness
    check: { column: status, where: { domain: data_quality_review }, equals: blocked }

  # ---- Data-quality findings (Core 1 hard DQ scope) ------------------------
  # After the NOT DONE / NS padding exclusion, a subject whose only ADPC rows were
  # structural padding correctly surfaces as Critical pk_absent_under_treatment, and
  # the predose screen is the generic predose_nonzero_baseline (NOT the deprecated
  # profile-level pk_outlier_vs_cohort / non_eoi_exceeds_eoi / predose_implausible_conc).
  - id: dq_one_critical_pk_absent
    question: "How many Critical pk_absent_under_treatment findings are there?"
    source: data_quality
    check: { count_where: { check_id: pk_absent_under_treatment, priority: Critical }, equals: 1 }
  - id: dq_no_deprecated_outlier
    question: "Did Core 1 emit any deprecated cohort-relative outlier findings?"
    source: data_quality
    check: { count_where: { check_id: pk_outlier_vs_cohort }, equals: 0 }
  - id: dq_no_deprecated_eoi
    question: "Did Core 1 emit any deprecated EOI/profile-shape findings?"
    source: data_quality
    check: { count_where: { check_id: non_eoi_exceeds_eoi }, equals: 0 }
  - id: dq_predose_is_nonzero_baseline
    question: "Is the Core 1 pre-dose screen the generic predose_nonzero_baseline?"
    source: data_quality
    check: { count_where: { check_id: predose_nonzero_baseline }, equals: 3 }
  - id: dq_no_deprecated_predose
    question: "Did Core 1 emit any deprecated Cmax-relative predose_implausible_conc findings?"
    source: data_quality
    check: { count_where: { check_id: predose_implausible_conc }, equals: 0 }
  - id: dq_priority_to_readiness_gate
    question: "Does the priority->readiness gate rule agree with the readiness file (Critical -> blocked)?"
    source: data_quality
    check: { gate_rule: priority_to_readiness, equals: blocked }

  # ---- Dose-normalization CP gate (Core 1 never assumes dose proportionality) ----
  - id: dose_prop_unknown_by_default
    question: "What is the default dose_proportionality_status?"
    source: dose_normalization
    check: { column: dose_proportionality_status, equals: unknown }
  - id: dose_normalized_not_allowed_by_default
    question: "Is dose-normalized comparison allowed by default?"
    source: dose_normalization
    check: { column: dose_normalized_comparison_allowed, equals: "no" }

  # ---- Scenario stamping ---------------------------------------------------
  - id: scenario_fields_present
    question: "Does every reusable CSV carry the scenario fields?"
    source: all
    check: { all_have_columns: [modality, indication_or_disease, scenario_key] }
  - id: scenario_key_consistent
    question: "Is scenario_key consistent (adc__oncology) across the snapshot?"
    source: dataset_inventory
    check: { column: scenario_key, where: { dataset: adsl }, equals: "adc__oncology" }

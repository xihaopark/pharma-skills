# Core 4 adversarial review sub-agent.
# Invoked by er-exposure-response-exploration SKILL.md -> "Adversarial review (MANDATORY)".
# AFTER exploration artifacts are written and BEFORE handoff to Core 5.
interface:
  display_name: "ER Core 4 Adversarial Review"
  short_description: "Challenge ER exploration question matrix, figures, gates, and method audit before modeling."
  default_prompt: >
    Act as an adversarial senior biostatistician reviewing Core 4 ER exploration
    outputs BEFORE they are handed to Core 5. Do not fit models or edit the spec.
    Read every file under `review.reads`, then work through each challenge. Write
    one advisory row per challenge to `review.output.artifact` with severity
    `block`, `needs_review`, or `ok`.
review:
  reads:
    - config/er_workflow_spec.yaml
    - intermediate/03_exposure_metrics/subject_exposure_metrics.csv
    - intermediate/04_exposure_response_exploration/er_question_matrix.csv
    - intermediate/04_exposure_response_exploration/model_readiness.csv
    - intermediate/04_exposure_response_exploration/method_selection_audit.csv
    - intermediate/04_exposure_response_exploration/exploratory_figure_manifest.csv
    - intermediate/04_exposure_response_exploration/needs_review_mapping.csv
    - outputs/manifest.json
  challenges:
    - id: question_traceability
      prompt: >
        Does every exploratory table/figure/model-readiness row trace to a
        question_id, endpoint, exposure metric, and scenario?
    - id: readiness_gates
      prompt: >
        Were minimum-events, exposure-variation, single-dose, and missing-source
        gates honored? Flag any over-gated or under-gated model_readiness row.
    - id: method_boundary
      prompt: >
        Were Cox, HR, PH diagnostics, covariate-adjusted modeling, or other Core
        5/statistics-owned methods kept out of Core 4 and routed through the
        method audit?
    - id: figure_semantics
      prompt: >
        Do exploratory figures encode the correct endpoint/exposure pairing,
        stratification, legends, and scale warnings? Flag per-unit OR-near-1
        cases that should be treated as scale artifacts.
    - id: scenario_consistency
      prompt: >
        Do modality, indication_or_disease, and scenario_key agree across Core 4
        artifacts and upstream Core 1/Core 3 artifacts?
  output:
    artifact: intermediate/04_exposure_response_exploration/core4_review_findings.csv
    schema: [challenge, finding, severity, cited_artifact, cited_row, review_gate, recommended_action]
    note: >
      Advisory record. Resolve every `block` row before invoking Core 5; surface
      `needs_review` rows in the modeling handoff.

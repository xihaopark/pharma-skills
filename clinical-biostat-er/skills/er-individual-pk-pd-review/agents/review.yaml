# Core 2 adversarial review sub-agent.
# Invoked by er-individual-pk-pd-review SKILL.md -> "Adversarial review (MANDATORY)".
# AFTER Core 2 artifacts are written and BEFORE handoff to Core 3.
# It does not rerun analysis or edit the spec. It writes an advisory CSV only.
interface:
  display_name: "ER Core 2 Adversarial Review"
  short_description: "Challenge individual PK/PD review artifacts before Core 3 consumes them."
  default_prompt: >
    Act as an adversarial senior pharmacometrician reviewing the Core 2
    individual PK/PD review output BEFORE it is handed to Core 3. Do not rerun
    the analysis, regenerate figures, or edit the workflow spec. Read every file
    under `review.reads`, then work through each item in `review.challenges`.
    For every challenge return one row with the challenge id, finding, severity
    (`block`, `needs_review`, or `ok`), cited artifact/row, review gate owner,
    and recommended action. Write the rows to `review.output.artifact`.
review:
  reads:
    - config/er_workflow_spec.yaml
    - intermediate/01_understanding_data/analysis_readiness_flags.csv
    - intermediate/01_understanding_data/analyte_inventory.csv
    - intermediate/02_individual_pk_pd_review/individual_pk_profile_records.csv
    - intermediate/02_individual_pk_pd_review/individual_pk_plot_manifest.csv
    - intermediate/02_individual_pk_pd_review/individual_pk_plot_point_listing.csv
    - intermediate/02_individual_pk_pd_review/individual_pk_plot_pk_timepoint_summary.csv
    - intermediate/02_individual_pk_pd_review/pooled_pk_ck_summary.csv
    - intermediate/02_individual_pk_pd_review/notable_subject_flags.csv
    - intermediate/02_individual_pk_pd_review/needs_review_mapping.csv
    - outputs/manifest.json
  challenges:
    - id: privacy_and_subject_keys
      prompt: >
        Did any reusable or joined artifact expose unmasked subject identifiers
        where masked IDs were required? Flag each leaked key or inconsistent ID
        mapping.
    - id: analyte_and_time_origin
      prompt: >
        Are plotted/analyzed analytes consistent with the Core 1 analyte scope?
        Are time origins, cycle labels, and visit labels explicit rather than
        inferred silently?
    - id: event_overlay_rules
      prompt: >
        Were responder rules, AESI/ILD terms, CRS/safety markers, and event
        overlays taken from confirmed spec/config blocks or clearly flagged as
        candidate/needs_review?
    - id: plot_convention_integrity
      prompt: >
        Do individual and pooled figures preserve the canonical conventions:
        shared time origin, visible legends, dose/event overlays, y-axis rules,
        and traceable plot_id-to-listing mappings?
    - id: scenario_consistency
      prompt: >
        Do modality, indication_or_disease, and scenario_key agree across Core 2
        artifacts and upstream Core 1 artifacts?
  output:
    artifact: intermediate/02_individual_pk_pd_review/core2_review_findings.csv
    schema: [challenge, finding, severity, cited_artifact, cited_row, review_gate, recommended_action]
    note: >
      Advisory record. Does not auto-edit spec or intermediates. Resolve every
      `block` row before invoking Core 3; surface `needs_review` rows in the
      Core 2 handoff.
